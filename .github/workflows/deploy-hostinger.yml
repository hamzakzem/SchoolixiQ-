name: Deploy Frontend to Hostinger

"on":
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "public/**"
      - "index.html"
      - "vite.config.ts"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/deploy-hostinger.yml"

concurrency:
  group: hostinger-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Require Hostinger deploy secrets
        run: |
          missing=""
          for key in HOSTINGER_FTP_SERVER HOSTINGER_FTP_USERNAME HOSTINGER_FTP_PASSWORD HOSTINGER_FTP_REMOTE_DIR; do
            if [ -z "${!key}" ]; then
              missing="$missing $key"
            fi
          done
          if [ -n "$missing" ]; then
            echo "::error title=Missing Hostinger secrets::Add GitHub repository secrets:$missing"
            exit 1
          fi
          remote="${HOSTINGER_FTP_REMOTE_DIR}"
          if [[ "$remote" == ./* ]] || [[ "$remote" == "./"* ]] || [[ "$remote" == "public_html"* ]]; then
            echo "::error title=Invalid HOSTINGER_FTP_REMOTE_DIR::Use the FULL absolute path from hPanel File Manager."
            echo "Wrong: ./public_html/ or public_html"
            echo "Right: /home/u758392104/domains/schoolixiq.com/public_html"
            exit 1
          fi
        env:
          HOSTINGER_FTP_SERVER: ${{ secrets.HOSTINGER_FTP_SERVER }}
          HOSTINGER_FTP_USERNAME: ${{ secrets.HOSTINGER_FTP_USERNAME }}
          HOSTINGER_FTP_PASSWORD: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          HOSTINGER_FTP_REMOTE_DIR: ${{ secrets.HOSTINGER_FTP_REMOTE_DIR }}

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend (static only)
        run: npm run build:web

      - name: Verify dist output
        run: |
          test -f dist/index.html
          test -f dist/.htaccess
          rm -f dist/server.cjs dist/server.cjs.map 2>/dev/null || true
          ls -la dist/

      - name: Package dist zip (manual fallback)
        run: |
          cd dist && zip -r ../schoolixiq-dist.zip . && cd ..
          ls -la schoolixiq-dist.zip

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: schoolixiq-dist
          path: schoolixiq-dist.zip
          retention-days: 7

      - name: Deploy to Hostinger (SFTP)
        uses: wlixcc/SFTP-Deploy-Action@v1.2.6
        with:
          server: ${{ secrets.HOSTINGER_FTP_SERVER }}
          port: 22
          username: ${{ secrets.HOSTINGER_FTP_USERNAME }}
          password: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          local_path: "./dist/*"
          remote_path: ${{ secrets.HOSTINGER_FTP_REMOTE_DIR }}
          sftp_only: true
          sftpArgs: "-o ConnectTimeout=30 -o StrictHostKeyChecking=no"
          rsyncArgs: "--exclude=server.cjs --exclude=server.cjs.map"

      - name: Deployment summary
        run: |
          echo "### Hostinger deploy" >> "$GITHUB_STEP_SUMMARY"
          echo "Uploaded contents of \`dist/\` into \`${{ secrets.HOSTINGER_FTP_REMOTE_DIR }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "If the site looks old: hPanel → Cache Manager → Purge, then hard-refresh the browser (Ctrl+Shift+R)." >> "$GITHUB_STEP_SUMMARY"
