name: Deploy Frontend to Hostinger

"on":
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "public/**"
      - "index.html"
      - "vite.config.ts"
      - "package.json"
      - "package-lock.json"

concurrency:
  group: hostinger-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Require Hostinger FTP secrets
        run: |
          missing=""
          for key in HOSTINGER_FTP_SERVER HOSTINGER_FTP_USERNAME HOSTINGER_FTP_PASSWORD; do
            if [ -z "${!key}" ]; then
              missing="$missing $key"
            fi
          done
          if [ -n "$missing" ]; then
            echo "::error title=Missing Hostinger FTP secrets::Add GitHub repository secrets:$missing"
            echo "hPanel -> Websites -> FTP Accounts, then Settings -> Secrets -> Actions"
            echo "See docs/HOSTINGER-DEPLOY.md"
            exit 1
          fi
        env:
          HOSTINGER_FTP_SERVER: ${{ secrets.HOSTINGER_FTP_SERVER }}
          HOSTINGER_FTP_USERNAME: ${{ secrets.HOSTINGER_FTP_USERNAME }}
          HOSTINGER_FTP_PASSWORD: ${{ secrets.HOSTINGER_FTP_PASSWORD }}

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Verify dist output
        run: |
          test -f dist/index.html
          test -f dist/.htaccess
          ls -la dist/

      - name: Deploy to Hostinger (FTP)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.HOSTINGER_FTP_SERVER }}
          username: ${{ secrets.HOSTINGER_FTP_USERNAME }}
          password: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          port: ${{ secrets.HOSTINGER_FTP_PORT }}
          protocol: ftp
          local-dir: ./dist/
          server-dir: ${{ secrets.HOSTINGER_FTP_REMOTE_DIR }}
          dangerous-clean-slate: false
          log-level: minimal

      - name: Deployment summary
        run: |
          echo "### Hostinger deploy" >> "$GITHUB_STEP_SUMMARY"
          echo "Frontend uploaded from dist/ to Hostinger public_html." >> "$GITHUB_STEP_SUMMARY"
