name: Deploy Frontend to Hostinger

"on":
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "public/**"
      - "index.html"
      - "vite.config.ts"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/deploy-hostinger.yml"

concurrency:
  group: hostinger-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Require Hostinger deploy secrets
        run: |
          missing=""
          for key in HOSTINGER_FTP_SERVER HOSTINGER_FTP_USERNAME HOSTINGER_FTP_PASSWORD HOSTINGER_FTP_REMOTE_DIR; do
            if [ -z "${!key}" ]; then
              missing="$missing $key"
            fi
          done
          if [ -n "$missing" ]; then
            echo "::error title=Missing Hostinger secrets::Add GitHub repository secrets:$missing"
            exit 1
          fi
          remote="${HOSTINGER_FTP_REMOTE_DIR}"
          if [[ "$remote" == ./* ]] || [[ "$remote" == "./"* ]] || [[ "$remote" == "public_html"* ]]; then
            echo "::error title=Invalid HOSTINGER_FTP_REMOTE_DIR::Use the FULL absolute path from hPanel."
            echo "Wrong: ./public_html/ or public_html"
            echo "Right: /home/USERNAME/domains/schoolixiq.com/public_html"
            echo "Or try: / (if FTP account root is already public_html)"
            exit 1
          fi
          port="${HOSTINGER_SFTP_PORT:-65002}"
          if [[ "$port" == "21" || "$port" == "22" ]]; then
            echo "::error title=Wrong SFTP port::Use 65002 on Hostinger shared hosting, not $port."
            exit 1
          fi
          host="${HOSTINGER_SFTP_HOST:-$HOSTINGER_FTP_SERVER}"
          echo "SFTP target: ${host}:${port}"
          echo "SFTP remote dir: ${remote}"
        env:
          HOSTINGER_FTP_SERVER: ${{ secrets.HOSTINGER_FTP_SERVER }}
          HOSTINGER_SFTP_HOST: ${{ secrets.HOSTINGER_SFTP_HOST }}
          HOSTINGER_FTP_USERNAME: ${{ secrets.HOSTINGER_FTP_USERNAME }}
          HOSTINGER_FTP_PASSWORD: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          HOSTINGER_FTP_REMOTE_DIR: ${{ secrets.HOSTINGER_FTP_REMOTE_DIR }}
          HOSTINGER_SFTP_PORT: ${{ secrets.HOSTINGER_SFTP_PORT }}

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend (static only)
        run: npm run build:web

      - name: Verify dist output
        run: |
          test -f dist/index.html
          test -f dist/.htaccess
          rm -f dist/server.cjs dist/server.cjs.map 2>/dev/null || true
          ls -la dist/

      - name: Package dist zip (manual fallback)
        run: |
          cd dist && zip -r ../schoolixiq-dist.zip . && cd ..
          ls -la schoolixiq-dist.zip

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: schoolixiq-dist
          path: schoolixiq-dist.zip
          retention-days: 7

      - name: Deploy to Hostinger (SFTP via lftp)
        env:
          SFTP_HOST: ${{ secrets.HOSTINGER_SFTP_HOST }}
          SFTP_SERVER: ${{ secrets.HOSTINGER_FTP_SERVER }}
          SFTP_USER: ${{ secrets.HOSTINGER_FTP_USERNAME }}
          SFTP_PASS: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          SFTP_PORT: ${{ secrets.HOSTINGER_SFTP_PORT }}
          SFTP_REMOTE: ${{ secrets.HOSTINGER_FTP_REMOTE_DIR }}
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq lftp
          HOST="${SFTP_HOST:-$SFTP_SERVER}"
          PORT="${SFTP_PORT:-65002}"
          echo "Connecting to sftp://${HOST}:${PORT} ..."
          lftp -e "
            set sftp:auto-confirm yes;
            set net:timeout 30;
            set net:max-retries 2;
            open -u ${SFTP_USER},${SFTP_PASS} sftp://${HOST}:${PORT};
            cd ${SFTP_REMOTE} || { echo 'cd failed — check HOSTINGER_FTP_REMOTE_DIR'; exit 1; };
            mirror -Rnev dist/ . --parallel=4 --exclude-glob server.cjs*;
            bye
          "

      - name: Deployment summary
        run: |
          echo "### Hostinger deploy" >> "$GITHUB_STEP_SUMMARY"
          echo "Uploaded \`dist/\` via SFTP (port 65002)." >> "$GITHUB_STEP_SUMMARY"
          echo "If the site looks old: hPanel → Cache Manager → Purge, then Ctrl+Shift+R." >> "$GITHUB_STEP_SUMMARY"
