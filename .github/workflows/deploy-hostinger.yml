name: Deploy Frontend to Hostinger

"on":
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "public/**"
      - "index.html"
      - "vite.config.ts"
      - "package.json"
      - "package-lock.json"

concurrency:
  group: hostinger-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Require Hostinger deploy secrets
        run: |
          missing=""
          for key in HOSTINGER_FTP_SERVER HOSTINGER_FTP_USERNAME HOSTINGER_FTP_PASSWORD HOSTINGER_FTP_REMOTE_DIR; do
            if [ -z "${!key}" ]; then
              missing="$missing $key"
            fi
          done
          if [ -n "$missing" ]; then
            echo "::error title=Missing Hostinger secrets::Add GitHub secrets:$missing"
            echo "HOSTINGER_FTP_REMOTE_DIR must be the FULL path to public_html (from hPanel File Manager)."
            echo "Example: /home/u123456789/domains/yourdomain.com/public_html"
            echo "See docs/HOSTINGER-DEPLOY.md"
            exit 1
          fi
        env:
          HOSTINGER_FTP_SERVER: ${{ secrets.HOSTINGER_FTP_SERVER }}
          HOSTINGER_FTP_USERNAME: ${{ secrets.HOSTINGER_FTP_USERNAME }}
          HOSTINGER_FTP_PASSWORD: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          HOSTINGER_FTP_REMOTE_DIR: ${{ secrets.HOSTINGER_FTP_REMOTE_DIR }}

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Verify dist output
        run: |
          test -f dist/index.html
          test -f dist/.htaccess
          ls -la dist/

      # Hostinger: GitHub runners often timeout on FTP:21 — use SFTP:22
      - name: Deploy to Hostinger (SFTP)
        uses: wangyucode/sftp-upload-action@v3
        with:
          host: ${{ secrets.HOSTINGER_FTP_SERVER }}
          port: ${{ secrets.HOSTINGER_SFTP_PORT || '22' }}
          username: ${{ secrets.HOSTINGER_FTP_USERNAME }}
          password: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          localDir: dist
          remoteDir: ${{ secrets.HOSTINGER_FTP_REMOTE_DIR }}
          forceUpload: true
          concurrency: 8

      - name: Deployment summary
        run: |
          echo "### Hostinger deploy (SFTP)" >> "$GITHUB_STEP_SUMMARY"
          echo "Uploaded \`dist/\` to \`${{ secrets.HOSTINGER_FTP_REMOTE_DIR }}\`" >> "$GITHUB_STEP_SUMMARY"
