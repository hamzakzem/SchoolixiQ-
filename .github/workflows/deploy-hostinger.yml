name: Deploy Frontend to Hostinger

# Manual only — production deploys via Hostinger built-in Git (main branch).
# GitHub Actions SFTP was disabled after repeated max-retries cd failures.
on:
  workflow_dispatch:

concurrency:
  group: hostinger-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      HOSTINGER_FTP_SERVER: ${{ secrets.HOSTINGER_FTP_SERVER }}
      HOSTINGER_FTP_USERNAME: ${{ secrets.HOSTINGER_FTP_USERNAME }}
      HOSTINGER_FTP_PASSWORD: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
      HOSTINGER_FTP_REMOTE_DIR: ${{ secrets.HOSTINGER_FTP_REMOTE_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Require Hostinger deploy secrets
        run: |
          missing=""
          for key in HOSTINGER_FTP_SERVER HOSTINGER_FTP_USERNAME HOSTINGER_FTP_PASSWORD HOSTINGER_FTP_REMOTE_DIR; do
            if [ -z "${!key}" ]; then
              missing="$missing $key"
            fi
          done
          if [ -n "$missing" ]; then
            echo "::error title=Missing Hostinger secrets::Add GitHub repository secrets:$missing"
            exit 1
          fi
          remote="${HOSTINGER_FTP_REMOTE_DIR}"
          remote="${remote%/}"
          if [[ -z "$remote" ]] || [[ "$remote" == *".."* ]]; then
            echo "::error title=Invalid HOSTINGER_FTP_REMOTE_DIR::Set a non-empty path such as domains/schoolixiq.com/public_html, /domains/schoolixiq.com/public_html, or /home/USERNAME/domains/schoolixiq.com/public_html"
            exit 1
          fi
          echo "SFTP server: ${HOSTINGER_FTP_SERVER}"
          echo "SFTP user: ${HOSTINGER_FTP_USERNAME}"
          echo "SFTP remote (configured): ${HOSTINGER_FTP_REMOTE_DIR}"
          echo "SFTP port: 65002"
          echo "Remote dir may be relative to SFTP login root or a full /home/USER/... path — deploy script will try fallbacks if cd fails."

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build frontend (static only)
        env:
          VITE_APP_URL: https://schoolixiq.com
          VITE_FIREBASE_VAPID_KEY: ${{ secrets.VITE_FIREBASE_VAPID_KEY }}
          VITE_ANDROID_APK_URL: ${{ secrets.VITE_ANDROID_APK_URL }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
        run: npm run build:web

      - name: Require Android APK in dist before deploy
        env:
          ANDROID_APK_DOWNLOAD_URL: ${{ secrets.ANDROID_APK_DOWNLOAD_URL }}
        run: npm run stage:apk:require

      - name: Verify web build integrity
        run: npm run verify:web-build

      - name: Verify no legacy Google auth in web bundle
        run: |
          set -e
          for pattern in 'iframerpc' 'idpiframe' 'platform.js' 'gapi.auth2' 'gsi/client' 'signInWithRedirect' '@codetrix-studio/capacitor-google-auth'; do
            if grep -rq "$pattern" dist/assets/ 2>/dev/null; then
              echo "::error::Legacy Google auth pattern found in dist: $pattern"
              grep -rl "$pattern" dist/assets/ || true
              exit 1
            fi
          done
          echo "No deprecated Google Identity / Capacitor web fallback patterns in dist/assets/"

      - name: Verify dist output
        run: |
          test -f dist/index.html
          test -f dist/.htaccess
          rm -f dist/server.mjs dist/server.cjs dist/server.cjs.map 2>/dev/null || true
          ls -la dist/
          if test -f dist/downloads/schoolixiq.apk; then
            echo "APK present in dist/downloads/schoolixiq.apk"
            ls -lh dist/downloads/schoolixiq.apk
          else
            echo "::error::dist/downloads/schoolixiq.apk missing — set GitHub secret ANDROID_APK_DOWNLOAD_URL (direct HTTPS APK URL) or place public/downloads/schoolixiq.apk before build"
            exit 1
          fi
      - name: Package dist zip (manual fallback)
        run: |
          cd dist && zip -r ../schoolixiq-dist.zip . && cd ..
          ls -la schoolixiq-dist.zip

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: schoolixiq-dist
          path: schoolixiq-dist.zip
          retention-days: 7

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Test Hostinger SFTP port
        run: nc -zv "${HOSTINGER_FTP_SERVER}" 65002 || true

      - name: Deploy to Hostinger (SFTP)
        run: bash scripts/hostinger-deploy.sh dist

      - name: Deployment summary
        run: |
          echo "### Hostinger deploy" >> "$GITHUB_STEP_SUMMARY"
          echo "Uploaded \`dist/\` to \`${HOSTINGER_FTP_REMOTE_DIR}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "If the site looks old: hPanel → Cache Manager → Purge, then Ctrl+Shift+R." >> "$GITHUB_STEP_SUMMARY"
