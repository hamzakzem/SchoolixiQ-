name: Deploy to Cloud Run

"on":
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: cloud-run-deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  GCP_PROJECT_ID: yala-safari-iq
  GCP_REGION: europe-west2
  CLOUD_RUN_SERVICE: schoolixiq-backend
  GCP_SERVICE_ACCOUNT: github-deployer@yala-safari-iq.iam.gserviceaccount.com

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Require Workload Identity Federation
        run: |
          if [ -z "${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}" ]; then
            echo "::error title=Missing GCP auth::Add GitHub secret GCP_WORKLOAD_IDENTITY_PROVIDER. Run scripts/gcp-setup-github-wif.sh in GCP once — see docs/DEPLOY-CLOUD-RUN.md"
            exit 1
          fi

      - uses: actions/checkout@v4

      - id: auth
        name: Authenticate to Google Cloud (OIDC / WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}
          project_id: ${{ env.GCP_PROJECT_ID }}
          create_credentials_file: true
          export_environment_variables: true

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Verify GCP credentials (preflight)
        run: |
          echo "Active account: $(gcloud config get-value account)"
          gcloud auth print-access-token >/dev/null
          echo "Access token OK"
          gcloud config set project "${{ env.GCP_PROJECT_ID }}"
          gcloud services list --enabled --filter="name:run.googleapis.com" --format="value(name)" | head -1

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}
          service: ${{ env.CLOUD_RUN_SERVICE }}
          region: ${{ env.GCP_REGION }}
          source: ./backend
          flags: --clear-base-image --port=8080

      - name: Deployment summary
        run: |
          echo "### Cloud Run deploy" >> "$GITHUB_STEP_SUMMARY"
          echo "- Service: \`${{ env.CLOUD_RUN_SERVICE }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Region: \`${{ env.GCP_REGION }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- URL: ${{ steps.deploy.outputs.url }}" >> "$GITHUB_STEP_SUMMARY"
