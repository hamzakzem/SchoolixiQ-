<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <!-- Elegant Deep Navy Royal Blue Gradient -->
    <linearGradient id="schoolix-navy-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B2345" />
      <stop offset="50%" stop-color="#07172E" />
      <stop offset="100%" stop-color="#020914" />
    </linearGradient>
    
    <!-- Rich Premium Golden Metallic Gradient -->
    <linearGradient id="schoolix-gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5C453" />
      <stop offset="50%" stop-color="#D4A64A" />
      <stop offset="100%" stop-color="#AC7E2D" />
    </linearGradient>
    
    <filter id="luxury-shadow" x="-10%" y="-10%" width="120%" height="120%" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0B2345" flood-opacity="0.12" />
    </filter>
  </defs>

  {/* Container background rounded card for standard mobile device launchers */}
  <rect width="512" height="512" rx="128" fill="#FFFFFF" />

  {/* Scale and translate the new stylized S Hexagon Logo to sit perfectly centered */}
  <g filter="url(#luxury-shadow)" transform="translate(56, 56) scale(0.8)">
    {/* Main S-Shape (Navy Blue Body) */}
    <path 
      d="M 250,35
         L 415,130
         C 423,135 428,144 428,154
         L 428,346
         C 428,356 423,365 415,370
         L 250,465
         C 242,470 232,470 224,465
         L 59,370
         C 51,365 46,356 46,346
         L 46,154
         C 46,144 51,135 59,130
         L 224,35
         C 232,30 242,30 250,35
         Z" 
      fill="url(#schoolix-navy-grad)" 
    />

    {/* Top-Right Golden Wing Segment */}
    <path 
      d="M 292,52
         L 410,120
         C 416,124 420,131 420,138
         L 420,224
         C 420,230 412,233 408,229
         L 290,161
         C 284,157 280,150 280,143
         L 280,57
         C 280,51 288,48 292,52
         Z" 
      fill="url(#schoolix-gold-grad)" 
    />

    {/* Bottom-Left Golden Wing Segment */}
    <path 
      d="M 208,448
         L 90,380
         C 84,376 80,369 80,362
         L 80,276
         C 80,270 88,267 92,271
         L 210,339
         C 216,343 220,350 220,357
         L 220,443
         C 220,449 212,452 208,448
         Z" 
      fill="url(#schoolix-gold-grad)" 
    />

    {/* S shape Track Overlays for clean white bounds */}
    <path 
      d="M 76,260 
         L 240,354 
         C 246,358 254,358 260,354 
         L 424,260" 
      stroke="#FFFFFF" 
      stroke-width="22" 
      stroke-linecap="round" 
      stroke-linejoin="round" 
    />
    <path 
      d="M 424,240 
         L 260,146 
         C 254,142 246,142 240,146 
         L 76,240" 
      stroke="#FFFFFF" 
      stroke-width="22" 
      stroke-linecap="round" 
      stroke-linejoin="round" 
    />

    <path 
      d="M 250,148 L 250,352" 
      stroke="#FFFFFF" 
      stroke-width="22" 
      stroke-linecap="round" 
    />
  </g>
</svg>
