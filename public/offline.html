<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>SchoolixiQ — لا يوجد اتصال</title>
    <style>
      :root {
        --navy: #0b2345;
        --navy-2: #112d57;
        --accent: #3b82f6;
        --text: #e6edf7;
        --muted: #9fb0ca;
      }
      * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
      html, body {
        margin: 0;
        height: 100%;
        background: radial-gradient(120% 120% at 50% 0%, var(--navy-2) 0%, var(--navy) 60%);
        color: var(--text);
        font-family: "Tajawal", "Segoe UI", system-ui, -apple-system, sans-serif;
      }
      .wrap {
        min-height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 32px 24px calc(32px + env(safe-area-inset-bottom));
      }
      .logo {
        width: 96px;
        height: 96px;
        border-radius: 24px;
        background: linear-gradient(145deg, #1d4ed8, #3b82f6);
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 18px 40px rgba(0, 0, 0, 0.35);
        margin-bottom: 28px;
      }
      .logo svg { width: 52px; height: 52px; }
      h1 { font-size: 22px; font-weight: 800; margin: 0 0 10px; }
      p { font-size: 15px; line-height: 1.7; color: var(--muted); max-width: 340px; margin: 0 0 28px; }
      button {
        appearance: none;
        border: 0;
        cursor: pointer;
        font-family: inherit;
        font-size: 16px;
        font-weight: 700;
        color: #fff;
        background: linear-gradient(145deg, #2563eb, #3b82f6);
        padding: 14px 40px;
        border-radius: 14px;
        box-shadow: 0 10px 24px rgba(37, 99, 235, 0.45);
        transition: transform 0.12s ease, opacity 0.12s ease;
      }
      button:active { transform: scale(0.97); opacity: 0.9; }
      button[disabled] { opacity: 0.6; cursor: default; }
      .spinner {
        width: 18px; height: 18px; margin-inline-start: 8px;
        border: 2px solid rgba(255, 255, 255, 0.4);
        border-top-color: #fff;
        border-radius: 50%;
        display: none;
        vertical-align: -3px;
        animation: spin 0.8s linear infinite;
      }
      .loading .spinner { display: inline-block; }
      @keyframes spin { to { transform: rotate(360deg); } }
      .hint { margin-top: 22px; font-size: 12.5px; color: var(--muted); opacity: 0.8; }
      .en { direction: ltr; margin-top: 6px; font-size: 13px; color: var(--muted); }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="logo" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 3 1 9l11 6 9-4.9V17h2V9L12 3Z" fill="#fff" />
          <path d="M5 13.2V17c0 1.7 3.1 3 7 3s7-1.3 7-3v-3.8l-7 3.8-7-3.8Z" fill="#dbeafe" />
        </svg>
      </div>
      <h1>تعذّر الاتصال بالخادم</h1>
      <p>
        يبدو أن جهازك غير متصل بالإنترنت أو أن الموقع غير متاح حالياً.
        تحقّق من اتصالك ثم أعد المحاولة.
      </p>
      <button id="retry" type="button">
        إعادة المحاولة
        <span class="spinner" aria-hidden="true"></span>
      </button>
      <div class="en">No internet connection — please try again</div>
      <div class="hint">SchoolixiQ • schoolixiq.com</div>
    </div>

    <script>
      (function () {
        var SITE = "https://schoolixiq.com";
        var btn = document.getElementById("retry");

        function attemptReload() {
          btn.classList.add("loading");
          btn.setAttribute("disabled", "disabled");
          window.location.replace(SITE);
        }

        btn.addEventListener("click", attemptReload);

        // Auto-recover: the moment the OS reports connectivity is back, retry.
        window.addEventListener("online", function () {
          attemptReload();
        });
      })();
    </script>
  </body>
</html>
