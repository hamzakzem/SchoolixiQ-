name: schoolix
description: "Schoolix Mobile Application - Professional WebView Wrapper with Firebase Native Features"
version: 1.0.0+1

publish_to: 'none'

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6
  
  # WebView & Rendering
  flutter_inappwebview: ^6.1.5
  flutter_spinkit: ^5.2.1
  
  # State & Persistence
  shared_preferences: ^2.2.3
  connectivity_plus: ^6.0.3
  
  # Firebase & Authentication
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.2
  firebase_messaging: ^15.0.3
  google_sign_in: ^6.2.1
  
  # Device Capabilities
  permission_handler: ^11.3.1
  url_launcher: ^6.3.0
  share_plus: ^10.0.2
  path_provider: ^2.1.3
  flutter_local_notifications: ^17.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  # Asset assets (such as images, logos, etc.)
  assets:
    - assets/images/logo.png
    - assets/images/splash_bg.png
